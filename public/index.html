<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTM Cabapuã - Sistema de Gestão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(233, 69, 96, 0.05) 0%, transparent 60%);
            animation: pulse-bg 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse-bg {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .hero-container {
            text-align: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .logo-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            display: block;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(233, 69, 96, 0.6));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #ffffff 0%, #e94560 50%, #f5a623 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px;
            max-width: 480px;
            margin: 0 auto 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .card-glass p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 0;
        }

        .features {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .feature-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 50px;
            padding: 8px 18px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }

        .feature-badge:hover {
            background: rgba(233, 69, 96, 0.2);
            border-color: rgba(233, 69, 96, 0.4);
            transform: translateY(-2px);
        }

        .feature-badge i {
            color: #e94560;
        }

        .btn-access {
            background: linear-gradient(135deg, #e94560 0%, #c13651 100%);
            border: none;
            padding: 16px 50px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(233, 69, 96, 0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-access:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(233, 69, 96, 0.6);
            color: white;
            background: linear-gradient(135deg, #f05370 0%, #e94560 100%);
        }

        .btn-access:active {
            transform: translateY(-1px);
        }

        .footer-text {
            margin-top: 40px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }

        /* Decorative orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            animation: orb-move 15s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(233, 69, 96, 0.15);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(100, 60, 200, 0.12);
            bottom: -80px;
            left: -80px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: rgba(245, 166, 35, 0.08);
            top: 50%;
            left: 10%;
            animation-delay: -10s;
        }

        @keyframes orb-move {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, -20px) scale(1.05); }
            66% { transform: translate(-15px, 15px) scale(0.95); }
        }

        @media (max-width: 576px) {
            .card-glass { padding: 30px 20px; }
            .hero-title { font-size: 2.2rem; }
            .features { gap: 10px; }
        }
    </style>
</head>
<body>
    <!-- Background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="hero-container">
        <span class="logo-icon">🥋</span>
        <h1 class="hero-title">CTM Cabapuã</h1>
        <p class="hero-subtitle">Sistema de Gestão de Academia</p>

        <div class="card-glass">
            <p>
                Gerencie alunos, check-ins, relatórios e muito mais em uma plataforma
                completa e intuitiva para sua academia de artes marciais.
            </p>
        </div>

        <div class="features">
            <div class="feature-badge">
                <i class="fas fa-users"></i> Gestão de Alunos
            </div>
            <div class="feature-badge">
                <i class="fas fa-check-circle"></i> Check-ins
            </div>
            <div class="feature-badge">
                <i class="fas fa-chart-bar"></i> Relatórios
            </div>
            <div class="feature-badge">
                <i class="fas fa-calendar"></i> Aniversariantes
            </div>
        </div>

        <a href="/.netlify/functions/api/login" class="btn-access">
            <i class="fas fa-sign-in-alt"></i>
            Acessar Sistema
        </a>

        <p class="footer-text">CTM Cabapuã &copy; 2025 &mdash; Todos os direitos reservados</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
