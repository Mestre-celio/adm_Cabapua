<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Editar' if atividade else 'Nova' }} Atividade - CTM Cabapuã</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('dashboard') }}">🥋 CTM Cabapuã</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('listar_atividades') }}">Voltar</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>{{ 'Editar' if atividade else 'Nova' }} Atividade</h2>
        <div class="card mt-4">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome *</label>
                        <input type="text" class="form-control" name="nome" value="{{ atividade.nome if atividade else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea class="form-control" name="descricao" rows="3">{{ atividade.descricao if atividade else '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tipo *</label>
                        <select name="tipo" class="form-select" required>
                            <option value="turma" {% if atividade and atividade.tipo == 'turma' %}selected{% endif %}>Turma (mensal por atividade)</option>
                            <option value="particular" {% if atividade and atividade.tipo == 'particular' %}selected{% endif %}>Particular (R$ 70/h)</option>
                            <option value="wellhub" {% if atividade and atividade.tipo == 'wellhub' %}selected{% endif %}>Wellhub</option>
                            <option value="totalpass" {% if atividade and atividade.tipo == 'totalpass' %}selected{% endif %}>TotalPass</option>
                            <option value="gurupass" {% if atividade and atividade.tipo == 'gurupass' %}selected{% endif %}>GuruPass</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Valor Base (R$) *</label>
                        <input type="number" step="0.01" min="0" class="form-control" name="valor_base" value="{{ atividade.valor_base if atividade else '' }}" required>
                        <small class="text-muted">Alunos com múltiplas atividades pagam 50% nas adicionais</small>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" name="ativa" id="ativa" {% if not atividade or atividade.ativa %}checked{% endif %}>
                        <label class="form-check-label" for="ativa">Atividade ativa</label>
                    </div>
                    <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Salvar</button>
                    <a href="{{ url_for('listar_atividades') }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
