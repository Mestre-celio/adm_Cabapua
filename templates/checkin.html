<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in - CTM Cabapua</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('dashboard') }}">CTM Cabapua</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-item nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <h2>Registrar Check-in</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else 'warning' if category == 'warning' else 'success' }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endwith %}
        
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">App de Origem *</label>
                        <select name="origem" class="form-select" required>
                            <option value="totalpass">TotalPass</option>
                            <option value="wellhub">Wellhub</option>
                            <option value="gurupass">GuruPass</option>
                            <option value="presencial">Presencial</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Matricula do App *</label>
                        <input type="text" name="matricula_app" class="form-control" required placeholder="Digite o numero da matricula">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Codigo de Verificacao (opcional)</label>
                        <input type="text" name="codigo" class="form-control" placeholder="Codigo fornecido pelo app">
                    </div>
                    
                    <button type="submit" class="btn btn-success">Registrar Check-in</button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
